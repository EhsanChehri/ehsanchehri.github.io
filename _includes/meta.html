<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }}{% else %}{{ site.name }}{% endif %}</title>
{% seo %}
{% if page.canonical_url != nil %}
<link rel="alternate" href="{{ page.canonical_url }}" hreflang="fa-ir">
{% else %}
<link rel="alternate" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}" hreflang="fa-ir">
{% endif %}
