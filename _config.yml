name: احسایدر

description: وبلاگ احسایدر

url: https://ehsaider.ir

permalink: /:title

encoding: UTF-8

compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]
  endings: all
  ignore:
    envs: [local]
  blanklines: false
  profile: false
  startings: [html, head, body]

timezone: Asia/Tehran

markdown: kramdown
kramdown:
   syntax_highlighter_opts:
      disable : true
