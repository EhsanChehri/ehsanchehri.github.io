name: احسایدر

description: وبلاگ احسایدر، روزنوشت‌ها و یادداشت‌های تخصصی

url: https://ehsaider.ir

permalink: /:title

encoding: UTF-8

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    default_lang: html
    css_class   : 'pre'

compress_html:
  clippings: all
  comments: [""]
  endings: []
  blanklines: false
  profile: false
  ignore:
    envs: []

sass:
  style: :compressed

gems:
  - jekyll-sitemap
  - jekyll-feed
