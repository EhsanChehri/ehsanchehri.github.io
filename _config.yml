name: وبلاگ احسان چهری

description: روزنوشت‌ها و یادداشت‌های شطرنجی به قلم احسان چهری

avatar: https://ehsanchehri.github.io/images/ehsaider.png

baseurl: "https://ehsanchehri.github.io"

permalink: /:title

encoding: UTF-8

footer-links:
  twitter: ehsanchehri
  rss: feed.xml

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

sass:
  style: :compressed

gems:
  - jekyll-sitemap
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME
