<!DOCTYPE html>
<html dir="rtl" lang="fa-IR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.name }}</title>
{% include meta.html %}
<link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css">
<link rel="alternate" type="application/rss+xml" href="{{ site.baseurl }}/feed.xml">
</head>
<body>
<div class="wrapper-masthead container">
<header class="masthead clearfix">
<nav>
<a title="{{ site.name }}" href="https://ehsanchehri.github.io/"><img src="{{ site.avatar }}" alt="{{ site.name }}"></a>
</nav>
</header>
</div>
<div id="main" role="main" class="container">{{ content }}</div>
<div class="wrapper-footer container">
<footer class="footer">
{% include svg-icons.html %}
</footer>
</div>
</body>
</html>
