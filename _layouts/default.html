<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }}{% else %}{{ site.name }}{% endif %}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
{% if page.canonical_url != nil %}
<link rel="canonical" href="{{ page.canonical_url }}">
{% else %}
<link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
{% endif %}
<link rel='stylesheet' href='{{ site.url }}/style.css' media='all'>
</head>
<body>
<div class="wrapper-masthead">
<div class="container">
<header class="masthead clearfix">
<nav>
<a title="{{ site.name }}" href="{{ site.url }}/"><img src="{{ site.avatar }}" alt="{{ site.name }}"></a>
</nav>
</header>
</div>
</div>
<div id="main" role="main" class="container">{{ content }}</div>
<div class="wrapper-footer">
<div class="container">
<footer class="footer">
{% if site.footer-links.rss %}<a href="feed.xml"><i class="svg-icon rss"></i></a>{% endif %}
{% if site.footer-links.twitter %}<a href="https://twitter.com/ehsanchehri"><i class="svg-icon twitter"></i></a>{% endif %}
</footer>
</div>
</div>
</body>
</html>
