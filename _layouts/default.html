---
layout: compress
---

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<title>{% if page.title %}{{ page.title }}{% else %}{{ site.name }}{% endif %}</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
{% if page.canonical_url != nil %}
<link rel="canonical" href="{{ page.canonical_url }}">
{% else %}
<link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
{% endif %}
<link rel="preload" href="{{ site.url }}/static/font/Vazir.woff2" as="font" type="font/woff2" crossorigin>
<style>
@font-face{font-family:Vazir;font-display:swap;src:url("/static/font/Vazir.woff2") format("woff2");font-weight:normal;font-style:normal}body{font:18px/1.8 Vazir,Tahoma}html{box-sizing:border-box}*,*:before,*:after{box-sizing:inherit}.container{margin:0 auto;max-width:740px;padding:0 10px;width:100%}h1{font-size:30px}h2{font-size:24px}h3{font-size:20px}h4{font-size:18px}p{margin:15px 0}a{color:black}ul{list-style-type:square}img{max-width:100%}video{width:100%}.wrapper-masthead{margin-bottom:5px}.masthead{padding:20px 0}nav{margin-top:5px}.posts>.post{padding-bottom:2em;border-bottom:1px solid lightgray}.posts a{text-decoration:none}.posts>.post:last-child{padding-bottom:1em;border-bottom:none}blockquote{margin:1.8em .8em;padding:0.1em 1em;font-style:italic;direction:rtl;border-left:none;border-right:4px solid silver}.wrapper-footer{border-top:1px solid lightgray}footer{padding:15px}.center{text-align:center}pre{direction:ltr;border:1px solid silver;border-radius:3px;padding:8px 12px;overflow-x:auto}.button{border:1px solid silver;border-radius:3px;padding:8px 16px;text-decoration:none;display:inline-block;margin-bottom:5px;margin-left:5px}hr{border-top:1px dotted gainsboro}
</style>
</head>
<body>
<div class="wrapper-masthead">
<div class="container">
<header class="masthead">
<a title="{{ site.name }}" href="{{ site.url }}/"><img src="{{ site.url }}/static/image/logo.svg" alt="{{ site.name }}" width="171" height="56"></a>
<nav>
<a href="{{ site.url }}/" class="button">خانه</a>
<a href="{{ site.url }}/seo" class="button">سئو</a>
<a href="{{ site.url }}/google-ranking-factors" class="button">فاکتورهای گوگل</a>
</nav>
</header>
</div>
</div>
<div id="main" role="main" class="container">{{ content }}</div>
<div class="wrapper-footer">
<div class="container">
<footer class="center">
<a href="{{ site.url }}/ehsanchehri" class="button">تماس با من</a>
</footer>
</div>
</div>
</body>
</html>
