<!DOCTYPE html>
<html ⚡ dir="rtl" lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% seo %}
{% if page.canonical_url != nil %}
<link rel="alternate" href="{{ page.canonical_url }}" hreflang="fa-ir">
{% else %}
<link rel="alternate" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}" hreflang="fa-ir">
{% endif %}
<link rel="stylesheet" type="text/css" href="style.css">
<link rel="alternate" type="application/rss+xml" href="feed.xml">
</head>
<body>
<div class="wrapper-masthead">
<div class="container">
<header class="masthead clearfix">
<nav>
<a title="{{ site.name }}" href="https://ehsanchehri.github.io/"><img src="{{ site.avatar }}" alt="{{ site.name }}"></a>
</nav>
</header>
</div>
</div>
<div id="main" role="main" class="container">{{ content }}</div>
<div class="wrapper-footer">
<div class="container">
<footer class="footer">
{% include svg-icons.html %}
</footer>
</div>
</div>
</body>
</html>
