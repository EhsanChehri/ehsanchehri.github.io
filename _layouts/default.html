---
layout: compress
---

<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
<title>{% if page.title %}{{ page.title }}{% else %}{{ site.name }}{% endif %}</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
{% if page.canonical_url != nil %}
<link rel="canonical" href="{{ page.canonical_url }}">
{% else %}
<link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
{% endif %}
<link rel="preload" href="{{ site.url }}/fonts/Vazir.woff2" as="font" type="font/woff2" crossorigin>
<link href="{{ site.url }}/style.css" rel="stylesheet" type="text/css">
</head>
<body>
<div class="wrapper-masthead">
<div class="container">
<header class="masthead clearfix">
<a title="{{ site.name }}" href="{{ site.url }}/" rel="home"><img src="{{ site.url }}/images/ehsaider.png" alt="{{ site.name }}"></a>
<nav>
<a href="{{ site.url }}/">صفحه اول</a>
<a href="{{ site.url }}/seo">سئو</a>
<a href="{{ site.url }}/chess">شطرنج</a>
</nav>
</header>
</div>
</div>
<div id="main" role="main" class="container">{{ content }}</div>
<div class="wrapper-footer">
<div class="container">
<footer>
<p class="footer"><a href="{{ site.url }}/ehsanchehri">تماس با من</a>&nbsp;
<a href="{{ site.url }}/feed.xml" target="_blank">RSS</a></p>
</footer>
</div>
</div>
</body>
</html>
