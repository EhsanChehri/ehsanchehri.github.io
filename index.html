---
layout: default
---
<h1><img alt="index" width="700" height="20" class="center" src="https://ehsanchehri.github.io/images/index.PNG"></h1>
<div class="posts">
  {% for post in site.posts %}
    <article class="post">

      <h2><a href="https://ehsanchehri.github.io{{ post.url }}">{{ post.title }}</a></h2>

      <div class="entry">
        {{ post.excerpt }}
      </div>

      <a href="https://ehsanchehri.github.io{{ post.url }}" class="read-more">ادامه مطلب</a>
    </article>
  {% endfor %}
</div>
